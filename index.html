<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime Hub Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #ff3e3e; --bg: #050505; --card-bg: #121212; --text: #ffffff; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text); padding-bottom: 75px; overflow-x: hidden; }

        .page { display: none; }
        .page.active { display: block; }

        /* ব্যানার স্লাইডার আপডেট করা ডিজাইন */
        .slider-container { 
            width: 100%; 
            position: relative; 
            overflow: hidden; 
            background: #000; 
            border-bottom: 1px solid #222;
        }

        /* মোবাইলের জন্য ব্যানারের সাইজ */
        @media (max-width: 767px) {
            .slider-container {
                aspect-ratio: 16 / 9; /* মোবাইলে সুন্দর দেখানোর জন্য স্ট্যান্ডার্ড রেশিও */
            }
        }

        /* ল্যাপটপ/ডেস্কটপের জন্য ব্যানারের সাইজ */
        @media (min-width: 1024px) { 
            .slider-container { 
                max-width: 900px; /* ল্যাপটপে ব্যানার এর চওড়া কমিয়ে আনা হয়েছে */
                margin: 15px auto; /* মাঝখানে রাখার জন্য */
                height: 300px; /* ল্যাপটপে উচ্চতা ফিক্সড করা হয়েছে যাতে বেশি বড় না লাগে */
                border-radius: 12px;
            } 
        }

        .slider { display: flex; height: 100%; transition: transform 0.5s ease-in-out; width: 100%; }
        .slide { min-width: 100%; height: 100%; cursor: pointer; }
        
        .slide img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* ইমেজ যাতে চারদিকে সুন্দরভাবে মানিয়ে যায় */
        }

        /* গ্রিড ডিজাইন */
        .section-title { padding: 15px; font-size: 18px; font-weight: bold; color: var(--primary); }
        .poster-grid { display: grid; gap: 10px; padding: 0 10px; grid-template-columns: repeat(3, 1fr); }
        @media (min-width: 1024px) { .poster-grid { grid-template-columns: repeat(6, 1fr); } }
        .poster-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .poster-card img { width: 100%; aspect-ratio: 2 / 3; object-fit: cover; }
        .poster-info { padding: 6px; text-align: center; }
        .poster-info h3 { font-size: 11px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* বটম ন্যাভ */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: #0a0a0a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #888; text-align: center; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        /* প্লেয়ার পেজ */
        .player-container { padding: 20px; text-align: center; }
        .video-preview { width: 100%; border-radius: 12px; margin-bottom: 20px; max-width: 600px; }
        .play-now-btn { background: var(--primary); color: white; padding: 15px 40px; border-radius: 30px; text-decoration: none; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="slider-container">
            <div class="slider" id="main-slider"></div>
        </div>
        <div class="section-title">Trending Now</div>
        <div class="poster-grid" id="main-grid">ডেটা লোড হচ্ছে...</div>
    </div>

    <div id="player-page" class="page">
        <div style="padding:15px; cursor:pointer;" onclick="showPage('home')">⬅️ Back</div>
        <div class="player-container">
            <img id="display-img" class="video-preview" src="">
            <h2 id="display-title"></h2>
            <p id="display-genre" style="color:#888;"></p>
            <a href="" id="display-link" class="play-now-btn">WATCH NOW</a>
        </div>
    </div>

    <div id="search" class="page">
        <div style="padding:20px;"><input type="text" style="width:100%; padding:12px; border-radius:25px; background:#1a1a1a; color:white; border:none;" placeholder="Search..." id="searchInput" oninput="filterSearch()"></div>
        <div class="poster-grid" id="search-results"></div>
    </div>

    <div id="category" class="page">
        <div class="category-list" id="genre-buttons" style="display:flex; flex-wrap:wrap; gap:8px; padding:15px; justify-content:center;"></div>
        <div class="poster-grid" id="category-results"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)">🏠<br>Home</div>
        <div class="nav-item" onclick="showPage('search', this)">🔍<br>Search</div>
        <div class="nav-item" onclick="showPage('category', this)">🎬<br>Category</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let animeData = [];
        let selectedGenres = [];
        const genresList = ["Action", "Adventure", "Comedy", "Drama", "Fantasy", "Romance", "Sci-Fi", "Isekai", "Harem", "School"];

        async function init() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/anmtubebd/anm-tube/main/data.json?v=' + Date.now());
                animeData = await res.json();
                
                const banners = animeData.filter(item => item.genre && item.genre.includes("Banner"));
                const slider = document.getElementById('main-slider');
                if(banners.length > 0) {
                    slider.innerHTML = banners.map(b => `<div class="slide" onclick="openPlayer('${b.title.replace(/'/g, "\\'")}', '${b.img}', '${b.link}', '${b.genre}')"><img src="${b.img}"></div>`).join('');
                    startSlider(banners.length);
                }

                const listData = animeData.filter(item => !item.genre || !item.genre.includes("Banner"));
                loadGrid(listData, 'main-grid');
                renderGenreButtons();
            } catch (e) { console.error(e); }
        }

        function startSlider(count) {
            let i = 0;
            setInterval(() => {
                i = (i + 1) % count;
                document.getElementById('main-slider').style.transform = `translateX(-${i * 100}%)`;
            }, 5000);
        }

        function loadGrid(data, id) {
            const container = document.getElementById(id);
            container.innerHTML = data.map(item => `
                <div class="poster-card" onclick="openPlayer('${item.title.replace(/'/g, "\\'")}', '${item.img}', '${item.link}', '${item.genre}')">
                    <img src="${item.img}">
                    <div class="poster-info"><h3>${item.title}</h3></div>
                </div>
            `).join('');
        }

        function openPlayer(title, img, link, genre) {
            document.getElementById('display-title').innerText = title;
            document.getElementById('display-img').src = img;
            document.getElementById('display-genre').innerText = "Genres: " + (genre || "N/A");
            document.getElementById('display-link').href = link;
            showPage('player-page');
        }

        function renderGenreButtons() {
            const container = document.getElementById('genre-buttons');
            container.innerHTML = genresList.map(g => `
                <div style="background:#1a1a1a; padding:8px 15px; border-radius:20px; font-size:12px; cursor:pointer; color:#fff;" class="${selectedGenres.includes(g) ? 'active-cat' : ''}" onclick="toggleGenre('${g}', this)">${g}</div>
            `).join('');
        }

        function toggleGenre(genre, btn) {
            if (selectedGenres.includes(genre)) selectedGenres = selectedGenres.filter(g => g !== genre);
            else selectedGenres.push(genre);
            
            // বাটন কালার টগল
            if(selectedGenres.includes(genre)) btn.style.background = "#ff3e3e";
            else btn.style.background = "#1a1a1a";

            const listData = animeData.filter(item => !item.genre || !item.genre.includes("Banner"));
            let filtered = listData.filter(anime => {
                const animeGenres = (anime.genre || "").split(',').map(g => g.trim());
                return selectedGenres.every(sg => animeGenres.includes(sg));
            });
            loadGrid(filtered, 'category-results');
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function filterSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const listData = animeData.filter(item => !item.genre || !item.genre.includes("Banner"));
            const res = listData.filter(a => a.title.toLowerCase().includes(term));
            loadGrid(res, 'search-results');
        }

        init();
    </script>
</body>
</html>
